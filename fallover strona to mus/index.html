<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Strona chwilowo niedostępna | StronaToMus</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Fascinate&display=swap" rel="stylesheet">
<style>
  :root{
    --krem:#F6F2E9;
    --krem-2:#EDE8DC;
    --granat:#0F1729;
    --granat-2:#192036;
    --biel:#FFFFFF;
    --czern:#0C0E15;
    --border:2px solid #0C0E15;
    --r-s:14px;
    --r-m:20px;
    --r-l:28px;
    --r-pill:100px;
    --shadow-m:4px 4px 0 var(--czern);
    --shadow-l:6px 6px 0 var(--czern);
    --font-display:'Fascinate', serif;
    --font-body:'DM Sans', sans-serif;
    --letter-display:0.009em;
    --ease:cubic-bezier(0.22,1,0.36,1);
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    height:100%;
    background:var(--krem);
    color:var(--granat);
    font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
  }
  body{
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    position:relative;
    overflow:hidden;
  }

  /* neo-brutalistyczna siatka w tle, jak na stronie głównej */
  body::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:
      linear-gradient(var(--krem-2) 1px, transparent 1px),
      linear-gradient(90deg, var(--krem-2) 1px, transparent 1px);
    background-size:48px 48px;
    opacity:0.55;
    pointer-events:none;
  }

  .card{
    position:relative;
    z-index:1;
    background:var(--biel);
    border:var(--border);
    box-shadow:var(--shadow-l);
    padding:clamp(40px, 6vw, 64px) clamp(28px, 6vw, 56px);
    text-align:center;
    max-width:560px;
    width:100%;
    border-radius:var(--r-l);
  }

  .logo{
    font-family:var(--font-display);
    font-weight:900;
    font-size:clamp(1.9rem, 4.5vw, 2.6rem);
    letter-spacing:var(--letter-display);
    color:var(--granat);
    display:inline-flex;
    align-items:center;
  }
  .logo-strona,
  .logo-mus{
    opacity:0;
    max-width:0;
    overflow:hidden;
    white-space:nowrap;
    animation-duration:6s;
    animation-timing-function:ease-in-out;
    animation-iteration-count:infinite;
  }
  .logo-strona{ animation-name:logoRevealStrona; }
  .logo-mus{ animation-name:logoRevealMus; }

  @keyframes logoRevealStrona{
    0%, 14%{ max-width:0; opacity:0; padding-right:0; }
    32%, 68%{ max-width:300px; opacity:1; padding-right:14px; }
    86%, 100%{ max-width:0; opacity:0; padding-right:0; }
  }
  @keyframes logoRevealMus{
    0%, 14%{ max-width:0; opacity:0; padding-left:0; }
    32%, 68%{ max-width:300px; opacity:1; padding-left:14px; }
    86%, 100%{ max-width:0; opacity:0; padding-left:0; }
  }

  .logo em{
    font-style:normal;
    background:var(--granat);
    color:var(--krem);
    padding:0 10px 3px;
    border-radius:6px;
    display:inline-block;
    animation:logoPulse 6s ease-in-out infinite;
  }

  @keyframes logoPulse{
    0%, 4%, 8%, 100%{ transform:scale(1); box-shadow:0 0 0 0 rgba(15,23,41,0.3); }
    2%, 6%{ transform:scale(1.08); box-shadow:0 0 0 10px rgba(15,23,41,0); }
  }

  .rule{
    width:64px;
    height:3px;
    background:var(--granat);
    border:none;
    border-radius:3px;
    margin:28px auto;
    opacity:0.15;
  }

  .headline{
    font-family:var(--font-display);
    font-weight:900;
    letter-spacing:var(--letter-display);
    font-size:clamp(1.5rem, 4vw, 2.1rem);
    margin:0 0 14px;
    color:var(--granat);
  }

  .sub{
    font-size:0.95rem;
    line-height:1.7;
    color:var(--granat);
    opacity:0.6;
    margin:0 0 30px;
  }

  .status{
    display:inline-flex;
    align-items:center;
    gap:10px;
    font-family:var(--font-body);
    font-weight:600;
    font-size:0.78rem;
    letter-spacing:1.5px;
    text-transform:uppercase;
    background:var(--granat);
    color:var(--krem);
    padding:10px 20px;
    border:var(--border);
    border-radius:var(--r-pill);
    box-shadow:2px 2px 0 var(--czern);
  }

  .status::before{
    content:"";
    width:7px;
    height:7px;
    background:var(--krem);
    border-radius:50%;
    animation:pulse 1.4s infinite ease-in-out;
    flex-shrink:0;
  }

  @keyframes pulse{
    0%,100%{ opacity:1; transform:scale(1); }
    50%{ opacity:0.35; transform:scale(0.7); }
  }

  @media (prefers-reduced-motion: reduce){
    .status::before{ animation:none; }
    .logo em{ animation:none; }
    .logo-strona, .logo-mus{ animation:none; opacity:1; max-width:300px; }
    .logo-strona{ padding-right:14px; }
    .logo-mus{ padding-left:14px; }
  }
</style>
</head>
<body>

  <div class="card">
    <span class="logo"><span class="logo-strona">Strona</span><em>To</em><span class="logo-mus">Mus</span></span>
    <hr class="rule">
    <h1 class="headline">Zaraz wracamy</h1>
    <p class="sub">Trwają krótkie prace techniczne po naszej stronie.<br>Odśwież za kilka minut — nic nie musisz robić.</p>
    <span class="status">Prace w toku</span>
  </div>

</body>
</html>
